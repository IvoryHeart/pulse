name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Smoke test binary
        run: |
          .build/release/pulse --version
          .build/release/pulse --help | head -5
