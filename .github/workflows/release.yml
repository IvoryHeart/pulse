name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create release and bump tap formula
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Version.swift matches tag
        run: |
          SRC_VERSION=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' Sources/PulseCore/Version.swift | tr -d '"')
          echo "Source version: $SRC_VERSION"
          echo "Tag version:    ${{ steps.version.outputs.version }}"
          if [ "$SRC_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Sources/PulseCore/Version.swift ($SRC_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build release
        run: swift build -c release

      - name: Smoke test
        run: .build/release/pulse --version

      - name: Run tests
        run: swift test

      - name: Compute source tarball SHA256
        id: sha
        run: |
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          echo "Downloading $TARBALL_URL"
          curl -fsSL -o source.tar.gz "$TARBALL_URL"
          SHA=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Source tarball SHA256: $SHA"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Install

            ```
            brew tap IvoryHeart/pulse
            brew install pulse
            ```

            Or from source:

            ```
            git clone https://github.com/${{ github.repository }}.git
            cd pulse
            swift build -c release
            ```

            **Source tarball SHA256:** `${{ steps.sha.outputs.sha256 }}`

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: IvoryHeart/homebrew-pulse
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cd homebrew-tap
          FORMULA=Formula/pulse.rb
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          SHA="${{ steps.sha.outputs.sha256 }}"

          # Update url and sha256 lines
          sed -i '' -E "s|url \".*\"|url \"$URL\"|" "$FORMULA"
          sed -i '' -E "s|sha256 \"[a-f0-9]*\"|sha256 \"$SHA\"|" "$FORMULA"

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Commit and push tap update
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pulse.rb
          if git diff --staged --quiet; then
            echo "No formula changes to commit."
          else
            git commit -m "pulse ${{ steps.version.outputs.version }}"
            git push
          fi
